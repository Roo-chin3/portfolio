                <h1>Contact Me</h1>
                <p>Feel free to say hello—I'm always open to new connections.</p>
                </div>
                <div class="box">
                <div class="contact-form-container">
                    <form  action="https://api.staticforms.xyz/submit" method="POST" id="contactForm">
                        <input type="hidden" name="apiKey" value="sf_2j06jbh43d68hdjci75ifh4m" target="_blank">
                        <div class="form-group">
                           <label for="name">Name</label>
                           <input type="name" id="name" name="name" placeholder="Your Name" required>
                           <span class="error-message" id="nameError"></span>
                        </div>
                        <div class="form-group">
                           <label for="email">Email</label>
                           <input type="email" id="email" name="email" placeholder="Your Email" required>
                           <span class="error-message" id="emailError"></span>
                        </div>
                        <div class="form-group">
                           <label for="message">Message</label>
                           <textarea id="message" name="message" placeholder="Your Message" rows="5" required></textarea>
                           <span class="error-message" id="messageError"></span>
                        </div>
                        <button type="submit" class="submit-button" target="_blank">Send Message</button>
                    </form>
